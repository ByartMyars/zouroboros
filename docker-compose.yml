version: '3.8'

services:
  zouroboros:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: zouroboros
    volumes:
      - ./workspace:/workspace
      - zouroboros-data:/app/data
      - zouroboros-logs:/app/logs
    environment:
      - ZO_WORKSPACE=/workspace
      - NODE_ENV=production
    networks:
      - zouroboros-network
    restart: unless-stopped
    
  # Optional: Ollama for embeddings
  ollama:
    image: ollama/ollama:latest
    container_name: zouroboros-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - zouroboros-network
    restart: unless-stopped
    profiles:
      - with-ollama

  # Optional: OmniRoute
  omniroute:
    image: marlandoj/omniroute:latest
    container_name: zouroboros-omniroute
    ports:
      - "20128:20128"
    environment:
      - OMNIROUTE_API_KEY=${OMNIROUTE_API_KEY}
    networks:
      - zouroboros-network
    restart: unless-stopped
    profiles:
      - with-omniroute

volumes:
  zouroboros-data:
  zouroboros-logs:
  ollama-data:

networks:
  zouroboros-network:
    driver: bridge